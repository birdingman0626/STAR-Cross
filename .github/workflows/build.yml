name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev ninja-build

      - name: Install Clang + OpenMP
        if: matrix.compiler == 'clang'
        run: sudo apt-get install -y clang libomp-dev

      - name: Build
        run: |
          cd source
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            export CC=clang CXX=clang++
          fi
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTAR_BUILD_TESTS=ON
          cmake --build build

      - name: Smoke test
        run: ./source/build/STAR --version

      - name: Unit tests
        run: ctest --test-dir source/build/test --output-on-failure -j4

      - name: Upload binary
        if: matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v7
        with:
          name: STAR-linux-x86_64
          path: source/build/STAR

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          brew install gcc ninja
          GCC_BIN=$(ls $(brew --prefix gcc)/bin/g++-* | sort -V | tail -1)
          GCC_VER=$(basename "$GCC_BIN" | grep -oE '[0-9]+$')
          echo "GCC_BIN=${GCC_BIN}"       >> $GITHUB_ENV
          echo "GCC_C_BIN=$(brew --prefix gcc)/bin/gcc-${GCC_VER}" >> $GITHUB_ENV

      - name: Build
        run: |
          cd source
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${GCC_C_BIN}" \
            -DCMAKE_CXX_COMPILER="${GCC_BIN}" \
            -DSTAR_BUILD_TESTS=ON
          cmake --build build

      - name: Smoke test
        run: ./source/build/STAR --version

      - name: Unit tests
        run: ctest --test-dir source/build/test --output-on-failure -j4

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: STAR-macos-aarch64
          path: source/build/STAR

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTAR_BUILD_TESTS=ON
          cmake --build build

      - name: Smoke test
        run: source\build\STAR.exe --version

      - name: Unit tests
        run: ctest --test-dir source/build/test --output-on-failure -j4

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: STAR-windows-x86_64
          path: source\build\STAR.exe

  # Verify the genomeGenerate suffix-array rewrite (PR #2687) produces a
  # byte-identical index vs the baseline on main, and is deterministic across
  # thread counts and chunk layouts.
  validate-genome-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need main history to build the baseline

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev ninja-build

      - name: Build candidate (this branch)
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTAR_BUILD_TESTS=OFF
          cmake --build build
          cp build/STAR "$GITHUB_WORKSPACE/STAR_new"

      - name: Build baseline (main, pre-#2687)
        run: |
          git worktree add /tmp/star-main origin/main
          cd /tmp/star-main/source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTAR_BUILD_TESTS=OFF
          cmake --build build
          cp build/STAR "$GITHUB_WORKSPACE/STAR_old"

      - name: Genome-index equivalence (old vs new, 1 vs 16 threads, multi-chunk)
        run: |
          chmod +x extras/tests/scripts/validate_genome_equivalence.sh
          extras/tests/scripts/validate_genome_equivalence.sh "$GITHUB_WORKSPACE/STAR_old" "$GITHUB_WORKSPACE/STAR_new"

  # Memory-safety of the splice-junction insertion path (sjdbBuildIndex) under
  # AddressSanitizer. Regression coverage for the funCalcSAi out-of-bounds read
  # (upstream issue #2657) and the #2687 sjdb sort rewrite.
  asan-sjdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev ninja-build

      - name: Build with AddressSanitizer
        run: |
          cd source
          cmake -B build-asan -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DSTAR_BUILD_TESTS=OFF -DSTAR_ASAN=ON
          cmake --build build-asan

      - name: sjdb insertion memory-safety (issue #2657)
        run: |
          chmod +x extras/tests/scripts/validate_sjdb_asan.sh
          extras/tests/scripts/validate_sjdb_asan.sh "$GITHUB_WORKSPACE/source/build-asan/STAR"
